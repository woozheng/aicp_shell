name: Build Windows/macOS/Linux/Android
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - name: Install Linux compile dependencies
        run: |
          sudo apt update
          sudo apt install -y clang cmake ninja-build pkg-config libgtk-3-dev libwebkit2gtk-4.1-0 libwebkit2gtk-4.1-dev libsoup-3.0-0 libgbm-dev
      - name: Remove flutter_sound dependency
        run: |
          sed -i '/flutter_sound:/d' pubspec.yaml
          flutter pub get
      - run: flutter build linux --release
      - name: Package zip
        run: zip -r Linux-x64.zip build/linux/x64/release/bundle
      - uses: actions/upload-artifact@v4
        with:
          name: Linux-x64-Bundle
          path: Linux-x64.zip

  build-windows:
    runs-on: windows-latest
    env:
      CXXFLAGS: "-D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS"
      CFLAGS: "-D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS"
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package zip
        run: Compress-Archive build/windows/x64/runner/Release Windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: Windows-x64-Bundle
          path: Windows-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - name: Remove flutter_sound dependency
        run: |
          sed -i '' '/flutter_sound:/d' pubspec.yaml
          flutter pub get
      - run: flutter build macos --release
      - name: Package zip
        run: zip -r macOS-App.zip build/macos/Build/Products/Release/*.app
      - uses: actions/upload-artifact@v4
        with:
          name: macOS-App
          path: macOS-App.zip

  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - name: Upgrade AGP to match androidx version & set NDK
        run: |
          # 升级根目录build.gradle.kts classpath AGP到8.9.1
          sed -i 's/classpath "com.android.tools.build:gradle:.*"/classpath "com.android.tools.build:gradle:8.9.1"/' android/build.gradle.kts
          # 设置NDK版本
          sed -i '/android {/a ndkVersion = "28.2.13676358"' android/app/build.gradle.kts
          flutter pub get
      - run: flutter build apk --release --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: Android-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk