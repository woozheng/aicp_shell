name: aicp_shell
description: AICP App Shell
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  
  # ===== 核心 =====
  webview_flutter: ^4.13.0
  shared_preferences: ^2.2.3
  cupertino_icons: ^1.0.8
  
  # ===== Windows WebView 实现 =====
  flutter_inappwebview: ^6.1.0

  # ===== 相机（锁定低版本camera，不触发compileSdk36强约束） =====
  camera: ^0.10.5+5
  # camera_ohos: ^0.0.7

  # ===== 硬件/系统插件（全平台兼容 Kotlin1.8 稳定版） =====
  image_picker: ^1.1.2
  geolocator: ^11.0.0
  url_launcher: ^6.2.6
  flutter_local_notifications: ^17.2.3
  permission_handler: ^11.3.1
  pasteboard: ^0.5.0

  share_plus: ^7.2.2
  connectivity_plus: ^6.0.4
  battery_plus: ^5.0.0
  path_provider: ^2.1.4
  mobile_scanner: ^5.1.1
  vibration: ^3.1.8
  flutter_blue_plus: ^1.31.3
  flutter_sound: ^9.2.13
  window_manager: ^0.5.1

  # 关键：锁定低版本device_info_plus，不依赖Kotlin2
  device_info_plus: ^10.1.0

  # ===== 本地 HTTP 桥接服务 =====
  shelf: ^1.4.1
  shelf_router: ^1.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/mobile_bridge.js
    - assets/index.html
    - assets/finder.html
    - assets/god_mode.html